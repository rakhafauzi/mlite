<style media="screen">
    th,
    td {
      white-space: nowrap;
      vertical-align: top !important;
    }
    .stat-title {
    font-size: 25px; 
  }
    .stat-bold {
    font-size: 22px; 
  }
  </style>
  <div class="row">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
      <div class="panel panel-default">
        <div class="panel-heading">
          <div class="btn-group pull-right" style="margin-top:-8px;">
            <span class="btn btn-sm dropdown-toggle" data-toggle="dropdown">
              <i class="fa fa-calendar"></i><span class="hidden-xs"> Periode Parsing</span>
            </span>
            <ul class="dropdown-menu dropdown-menu-left">
              <form class="" action="{?=url([ADMIN,'jkn_mobile_v2','parsingsurkon'])?}" method="POST">
                <li style="padding-left:5px;padding-right:5px;">
                  <input type="text" id="periode_parsing" class="form-control periode_parsing" name="periode_parsing"
                    required>
                </li>
                <li style="padding-left:5px;padding-right:5px;margin-top:5px;">
                  <input type="submit" name="" class="btn btn-primary btn-block" value="Submit">
                </li>
              </form>
            </ul>
          </div>
          <h3 class="panel-title">Parsing Surat Kontrol Tanggal {$stats.tanggal}</h3>
        </div>
        <div class="panel-body">
            <div class="col-md-6 col-sm-6 col-xs-12">
                <div class="panel panel-default">
                    <div class="panel-body bg-danger">
                        <span class="fa-3x fa-stack fa-lg pull-left">
                            <i class="fa fa-calendar fa-stack-1x"></i>
                        </span>
                        <div class="stat-title text-grey">Booking Registrasi
                        </div>
                        <div class="stat-bold">
                            <b>{$stats.Jmlbooking}</b> dari <b>{$stats.Pasienbooking}</b> 
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-sm-6 col-xs-12">
                <div class="panel panel-default">
                    <div class="panel-body bg-info">
                        <span class="fa-3x fa-stack fa-lg pull-left">
                            <i class="fa fa-calendar-plus-o fa-stack-1x"></i>
                        </span>
                        <div class="stat-title text-grey">Surat Kontrol
                        </div>
                        <div class="stat-bold">
                            <b>{$stats.Jmlsurkon}</b> dari <b>{$stats.Pasiensurkon}</b> 
                        </div>
                    </div>
                </div>
            </div>
          {loop: $list as $value}
          <span>No Sep => </span>{$value.no_sep}<span> || Keterangan => </span>{$value.keterangan}<br>
          {/loop}
        </div>
      </div>
    </div>
  </div> 
  <script type="text/javascript">
    $(function () {
      $('.periode_parsing').datetimepicker({
        defaultDate: "{?=date('Y-m-d')?}",
        format: 'YYYY-MM-DD',
        locale: 'id'
      });
    });
  </script>
